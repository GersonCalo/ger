services:
  db:
    image: postgres:16
    container_name: finanzas_db
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://app:app@db:5432/app
    depends_on:
      db:
        condition: service_healthy
    command: ["sh","-c","cd /usr/src/app/apps/api && npx prisma db push --accept-data-loss --schema=../../packages/db/schema.prisma"]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: development
      PORT: 8080
      DATABASE_URL: postgres://app:app@db:5432/app
      JWT_SECRET: "changeme-dev"
      VAPID_PUBLIC_KEY: "BMf_bCClzkLDHBoro-tERX2bqoQawjkHFFzhPtY4sOpQQnn_wa7zWGAzxdcKllhICtTm-kEGR1LwgPYJ5pdnqY8"
      VAPID_PRIVATE_KEY: "kX96ZYlcmEyvadbuGaUd4KQP4dIxia13QhhdtxmTyK0"
      VAPID_MAILTO: "mailto:admin@example.com"
    ports:
      - "0.0.0.0:8080:8080"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  e2e:
    image: mcr.microsoft.com/playwright:v1.59.1-jammy
    container_name: finanzas_e2e
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - CI=true
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - E2E_BASE_URL=http://web:3000
      - E2E_API_URL=http://api:8080/api/v1
    depends_on:
      - web
      - api
    networks:
      - default
    command: ["npx", "playwright", "test", "--reporter=list,html,json,junit", "--timeout=60000"]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://api:8080}
    ports:
      - "0.0.0.0:3000:3000"
    depends_on:
      - api
    develop:
      watch:
        - path: ./apps/web/package.json
          action: rebuild
        - path: ./apps/web
          target: /usr/src/app/apps/web
          action: sync

volumes:
  postgres_data:
