services:
  db:
    image: postgres:15
    container_name: finanzas_db
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://app:app@db:5432/app
    depends_on:
      db:
        condition: service_healthy
    command: ["sh","-c","cd /usr/src/app/apps/api && npx prisma db push --accept-data-loss --schema=../../packages/db/schema.prisma"]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: development
      PORT: 8080
      DATABASE_URL: postgres://app:app@db:5432/app
      JWT_SECRET: "changeme-dev"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    environment:
      VITE_API_URL: "http://localhost:8080"
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
